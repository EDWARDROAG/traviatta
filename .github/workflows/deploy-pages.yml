# Despliega el frontend React (Vite) en GitHub Pages.
# URL esperada: https://lamakinetfood-png.github.io/lamakinetfood/
#
# Requisito (una sola vez): Settings → Pages → Source: GitHub Actions
# Patrón: Pañalera (Pages) + Aura (build Vite)

name: Deploy frontend (Pages)

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-frontend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar y construir frontend
        working-directory: frontend
        env:
          VITE_BASE_PATH: /lamakinetfood/
        run: |
          npm ci
          npm run build

      - name: SPA fallback (404 → index.html)
        run: cp frontend/dist/index.html frontend/dist/404.html

      - name: Verificar artefacto
        run: |
          test -f frontend/dist/index.html || (echo "❌ Falta frontend/dist/index.html" && exit 1)
          echo "✅ Se publicará frontend/dist/"

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Resumen
        run: |
          echo "## Vista previa publicada" >> "$GITHUB_STEP_SUMMARY"
          echo "**URL:** ${{ steps.deployment.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Frontend Vite desde \`frontend/\` con base \`/lamakinetfood/\`." >> "$GITHUB_STEP_SUMMARY"
