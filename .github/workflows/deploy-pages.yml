# Despliega el frontend React (Vite) en GitHub Pages.
# URL esperada: https://lamakinetfood-png.github.io/lamakinetfood/
#
# Una sola vez en GitHub:
#   Settings → Pages → Build and deployment → Source: GitHub Actions

name: Deploy frontend (Pages)

on:
  push:
    branches: [main, master]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-frontend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar y construir frontend
        working-directory: frontend
        env:
          # Project site bajo /lamakinetfood/
          VITE_BASE_PATH: /lamakinetfood/
          # Carta digital sin API (staticMenus)
          VITE_USE_STATIC_MENU: 'true'
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "⚠️ Sin package-lock.json — usando npm install"
            npm install
          fi
          npm run build

      - name: SPA fallback (404 → index.html)
        run: cp frontend/dist/index.html frontend/dist/404.html

      - name: Verificar artefacto
        run: |
          test -f frontend/dist/index.html || (echo "❌ Falta frontend/dist/index.html" && exit 1)
          echo "✅ Se publicará frontend/dist/"
          ls -la frontend/dist | head -20

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Resumen
        run: |
          echo "## Vista previa publicada" >> "$GITHUB_STEP_SUMMARY"
          echo "**URL:** ${{ steps.deployment.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Base Vite: \`/lamakinetfood/\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Menú estático: \`VITE_USE_STATIC_MENU=true\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Repo: \`lamakinetfood-png/lamakinetfood\`" >> "$GITHUB_STEP_SUMMARY"
